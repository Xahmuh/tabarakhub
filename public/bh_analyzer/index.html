<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="0; url=/?bh_analyzer=1" />
</head>
<body>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      params.set("bh_analyzer", "1");
      var target = "/?" + params.toString() + (window.location.hash || "");
      window.location.replace(target);
    })();
  </script>
</body>
</html>
